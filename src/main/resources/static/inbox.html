<!DOCTYPE html>
<html>
<head>
    <title>Inbox</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/inbox.css">
</head>
<body>

<header class="header">
    <div class="logo">TEMP<span>MAIL</span></div>
    <div class="header-right">
        <div class="timer-badge" id="timerBadge">
            <div class="timer-dot"></div>
            <span id="timerText">--:--</span>
        </div>
        <button class="new-inbox-btn" onclick="window.location.href='/'">+ New Inbox</button>
    </div>
</header>

<main>
    <div class="address-card">
        <div class="address-label">Your temporary address</div>
        <div class="address-row">
            <div class="address-text" id="emailDisplay">Loading...</div>
            <button class="copy-btn" id="copyBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy
            </button>
        </div>
    </div>

    <div class="inbox-header">
        <div class="inbox-title">
            Inbox
            <span class="count-badge" id="countBadge">0</span>
        </div>
        <button class="refresh-btn" id="refreshBtn" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
        </button>
    </div>

    <div id="emailsContainer"></div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<script src="/js/inbox.js"></script>
</body>
</html>
