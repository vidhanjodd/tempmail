<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail — Disposable Email</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>

<div class="container">
    <div class="badge">✦ Disposable Email Service</div>
    <h1>TEMP<span>MAIL</span></h1>
    <p class="subtitle">Generate a throwaway inbox instantly. No signup, no tracking, gone in 10 minutes.</p>

    <button class="btn" id="generateBtn">
            <span class="btn-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </span>
        <div class="spinner"></div>
        Generate Email
    </button>

    <div class="features">
        <div class="feature"><div class="feature-dot"></div>10 min expiry</div>
        <div class="feature"><div class="feature-dot"></div>No signup</div>
        <div class="feature"><div class="feature-dot"></div>Auto-refresh</div>
    </div>
</div>

<script src="/js/index.js"></script>
</body>
</html>
